<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUP</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#060408; color:#eeeae0; font-family:'Courier New',monospace;
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center; padding:4rem 1rem 3rem;
  gap:2.4rem;
}
nav {
  position:fixed; top:2rem; left:50%; transform:translateX(-50%);
  font-size:.6rem; letter-spacing:.2em; color:#444;
}
nav a { color:#1D9E75; text-decoration:none; opacity:.6; }
nav a:hover { opacity:1; }
.gif-wrap {
  max-width: 380px; width:100%;
  display:flex; flex-direction:column; align-items:center;
}
.gif-wrap img {
  width:100%; display:block;
  border-radius:4px;
}
.signal {
  font-size:.85rem; color:#EF9F27; opacity:.3;
  letter-spacing:.6em; margin-top:1rem;
}

/* ── Basilisk eye scroll-to-top ── */
#eye-top {
  position: fixed; bottom: 1.8rem; right: 1.8rem;
  width: 44px; height: 44px;
  cursor: pointer; opacity: 0;
  transition: opacity .4s, transform .3s;
  transform: translateY(8px);
  z-index: 999; border: none; background: none; padding: 0;
}
#eye-top.visible { opacity: 0.7; transform: translateY(0); }
#eye-top:hover   { opacity: 1; }
#eye-top canvas  { display: block; }
</style>
</head>
<body>
<nav><a href="index.html">← gup</a></nav>

<div class="gif-wrap">
  <img src="img/gup-risk-of-rain.gif" alt="erm.. what the Gup?">
</div>

<div class="gif-wrap">
  <img src="img/gup-risk-of-rain2.gif" alt="GUP IS RAPIDLY APPROACHING YOUR LOCATION">
</div>

<div class="signal">gup.</div>

<!-- ── Basilisk eye scroll-to-top ── -->
<button id="eye-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="scroll to top">
  <canvas id="eye-canvas" width="44" height="44"></canvas>
</button>
<script>
// ── Basilisk eye button ──
(function(){
  const btn = document.getElementById('eye-top');
  const ec  = document.getElementById('eye-canvas');
  if(!btn||!ec) return;
  const ex = ec.getContext('2d');
  let eT = 0;

  function drawEye(){
    ex.clearRect(0,0,44,44);
    const cx=22,cy=22;
    // Iris
    ex.beginPath();ex.ellipse(cx,cy,16,16,0,0,Math.PI*2);
    ex.fillStyle='#8a9a2a';ex.fill();
    // Slit pupil — rotates slowly
    const slitAngle = eT * 0.012;
    const slitH = Math.abs(Math.sin(eT*0.4))*6+3;
    ex.save();ex.translate(cx,cy);ex.rotate(slitAngle);
    ex.beginPath();ex.ellipse(0,0,3,slitH,0,0,Math.PI*2);
    ex.fillStyle='#060408';ex.fill();ex.restore();
    // Specular highlight
    ex.beginPath();ex.arc(cx+4,cy-4,2.5,0,Math.PI*2);
    ex.fillStyle='rgba(255,255,255,0.6)';ex.fill();
    // Thin outer ring
    ex.beginPath();ex.ellipse(cx,cy,17,17,0,0,Math.PI*2);
    ex.strokeStyle='rgba(138,154,42,0.4)';ex.lineWidth=1;ex.stroke();
    eT+=0.016;requestAnimationFrame(drawEye);
  }
  drawEye();

  window.addEventListener('scroll', ()=>{
    btn.classList.toggle('visible', window.scrollY > 300);
  });
})();
</script>
</body>
</html>
