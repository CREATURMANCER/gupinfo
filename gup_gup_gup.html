<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUP</title>
<style>
html { font-size: 17px; }
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#060408; color:#eeeae0; font-family:'Courier New',monospace;
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center; padding:4rem 1rem 3rem;
  gap:2.4rem;
}
nav {
  position:fixed; top:2rem; left:50%; transform:translateX(-50%);
  font-size:.6rem; letter-spacing:.2em; color:#444;
}
nav a { color:#1D9E75; text-decoration:none; opacity:.6; }
nav a:hover { opacity:1; }
.gif-wrap {
  max-width: 380px; width:100%;
  display:flex; flex-direction:column; align-items:center;
}
.gif-wrap img {
  width:100%; display:block;
  border-radius:4px;
}
.signal {
  font-size:.85rem; color:#EF9F27; opacity:.3;
  letter-spacing:.6em; margin-top:1rem;
}

/* ── Basilisk eye scroll-to-top ── */
#eye-top {
  position: fixed; bottom: 1.8rem; right: 1.8rem;
  width: 44px; height: 44px;
  cursor: pointer; z-index: 9999;
  border: none; background: none; padding: 0;
}
#eye-top:hover { transform: scale(1.1); }
#eye-top svg { display: block; width: 44px; height: 44px; }

</style>
</head>
<body>
<nav><a href="index.html">← gup</a></nav>

<div class="gif-wrap">
  <img src="img/gup-risk-of-rain.gif" alt="erm.. what the Gup?">
</div>

<div class="gif-wrap">
  <img src="img/gup-risk-of-rain2.gif" alt="GUP IS RAPIDLY APPROACHING YOUR LOCATION">
</div>


<div class="signal">gup.</div>

<!-- ── Basilisk eye scroll-to-top ── -->
<button id="eye-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="scroll to top">
  <svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
    <!-- Iris -->
    <ellipse cx="22" cy="22" rx="16" ry="16" fill="#8a9a2a"/>
    <!-- Slit pupil -->
    <ellipse cx="22" cy="22" rx="3.5" ry="9" fill="#060408"/>
    <!-- Specular highlight -->
    <circle cx="27" cy="17" r="2.5" fill="rgba(255,255,255,0.55)"/>
    <!-- Outer ring -->
    <ellipse cx="22" cy="22" rx="17" ry="17" fill="none" stroke="rgba(138,154,42,0.4)" stroke-width="1"/>
  </svg>
</button>
<script>
// ── Basilisk eye scroll-to-top ── (no fade)
</script>
</body>
</html>
